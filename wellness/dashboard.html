<!DOCTYPE html>
<!-- dashboard.html -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wellness Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --card:#ffffff;
    --ink:#474747;
    --muted:#948f8f;
    --line:#e2dcdc;
    --rose:#daaba6;
    --wine:#722f39;
    --charcoal:#474747;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:transparent;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:12px;
  }

  .card{
    width:100%;
    max-width:980px;
    background:var(--card);
    border-radius:18px;
    padding:10px 12px;
    box-shadow:0 1px 2px rgba(0,0,0,0.03);
    display:flex;
    align-items:stretch;
    gap:10px;
  }

  .left-stack{
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    gap:4px;
    min-width:190px;
  }

  .eyebrow{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:10px;
    letter-spacing:.18em;
    font-weight:600;
    color:var(--muted);
  }
  .eyebrow svg{width:13px;height:13px;flex-shrink:0;}

  .today-label{
    font-family:'Playfair Display',serif;
    font-size:18px;
    margin:0;
  }
  .today-sub{
    margin:0;
    font-size:12px;
    color:var(--muted);
  }

  .tile{
    border-radius:14px;
    border:1px solid var(--line);
    background:#faf7f6;
    padding:6px 9px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:4px;
    min-width:140px;
    flex:1 1 0;
    height:90px;
  }

  .score-tile{
    min-width:190px;
    max-width:230px;
  }

  .tile-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:4px;
  }
  .tile-label{
    font-size:9px;
    letter-spacing:.12em;
    font-weight:600;
    color:var(--muted);
  }
  .tile-tag{
    font-size:9px;
    padding:2px 7px;
    border-radius:999px;
    background:#f1e3e2;
    color:var(--wine);
    font-weight:500;
    white-space:nowrap;
  }

  .tile-main{
    display:flex;
    align-items:flex-end;
    gap:4px;
  }
  .tile-main strong{
    font-family:'Playfair Display',serif;
    font-size:18px;
    color:var(--wine);
  }
  .tile-main span{
    font-size:11px;
    color:var(--muted);
  }

  .tile-note{
    font-size:10px;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .score-label{
    font-size:9px;
    letter-spacing:.14em;
    font-weight:600;
    color:var(--muted);
  }
  .score-value{
    font-family:'Playfair Display',serif;
    font-size:18px;
    font-weight:600;
    color:var(--wine);
  }
  .score-caption{
    font-size:10px;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .right-row{
    flex:1;
    display:flex;
    flex-wrap:nowrap;
    gap:8px;
    align-items:stretch;
    justify-content:flex-end;
  }

  .mood-emoji{
    font-size:18px;
  }

  @media (max-width:800px){
    .card{
      flex-direction:column;
    }
    .right-row{
      flex-wrap:wrap;
    }
  }
</style>
</head>
<body>
<div class="card">
  <div class="left-stack">
    <div>
      <div class="eyebrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9"/>
          <path d="M9 10h.01M15 10h.01M8 15c1 1.2 2.4 2 4 2s3-.8 4-2"/>
        </svg>
        WELLNESS
      </div>
      <p class="today-label">Today</p>
      <p class="today-sub" id="todayLabel">—</p>
    </div>

    <div class="tile score-tile">
      <div class="tile-header">
        <span class="tile-label">W
